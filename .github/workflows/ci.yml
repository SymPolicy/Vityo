name: platform-adaptation

on:
  pull_request:
  push:
    branches:
      - release
      - stable
      - nightly

jobs:
  linux:
    name: platform-adaptation / linux-ci-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      STYIO_PYTHON_VERSION: "3.13.5"
      STYIO_NODE_VERSION: "24.15.0"
      STYIO_FLUTTER_VERSION: "3.41.7"

    steps:
      - name: Checkout styio-view
        uses: actions/checkout@v5
        with:
          path: styio-view

      - name: Resolve sibling checkout ref
        id: sibling-ref
        shell: bash
        run: |
          requested="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" || "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
            requested="${{ github.base_ref }}"
          fi

          for ref in "$requested" stable nightly; do
            if git ls-remote --exit-code --heads https://github.com/SymPolicy/Styio.git "$ref" >/dev/null 2>&1 \
              && git ls-remote --exit-code --heads https://github.com/SymPolicy/Pafio.git "$ref" >/dev/null 2>&1; then
              echo "ref=$ref" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "No common sibling checkout ref found for '$requested' or fallbacks 'stable'/'nightly'." >&2
          exit 1

      - name: Checkout Styio sibling repository
        uses: actions/checkout@v5
        with:
          repository: SymPolicy/Styio
          ref: ${{ steps.sibling-ref.outputs.ref }}
          path: styio-nightly

      - name: Checkout Pafio sibling repository
        uses: actions/checkout@v5
        with:
          repository: SymPolicy/Pafio
          ref: ${{ steps.sibling-ref.outputs.ref }}
          path: styio-pafio

      - name: Set up standardized Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.STYIO_PYTHON_VERSION }}

      - name: Set up standardized Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.STYIO_NODE_VERSION }}

      - name: Set up standardized Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.STYIO_FLUTTER_VERSION }}

      - name: Install standardized Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium
          chromium_version="$(chromium --product-version)"
          test -n "$chromium_version"
          echo "STYIO_CHROMIUM_VERSION=$chromium_version" >> "$GITHUB_ENV"
          echo "Chromium $chromium_version"

      - name: Verify standardized toolchain
        run: |
          python3 --version | grep -F "${STYIO_PYTHON_VERSION}"
          node --version | grep -F "v${STYIO_NODE_VERSION}"
          npm --version
          flutter --version | head -n1 | grep -F "${STYIO_FLUTTER_VERSION}"
          chromium --product-version | grep -F "${STYIO_CHROMIUM_VERSION}"

      - name: Restore repository dependencies
        working-directory: styio-view
        run: |
          cd prototype && npm ci
          cd ../frontend/styio_view_app && flutter pub get

      - name: Flutter lifecycle unit tests
        working-directory: styio-view/frontend/styio_view_app
        run: >
          flutter test
          test/module_lifecycle_test.dart
          test/runtime_surfaces_test.dart
          test/hosted_control_plane_client_test.dart
          test/shell_model_test.dart
          test/execution_adapter_test.dart
          test/workspace_document_store_test.dart

      - name: Docs gate
        working-directory: styio-view
        run: ./scripts/docs-gate.sh

      - name: Checkpoint health
        working-directory: styio-view
        env:
          STYIO_CHROME_PATH: /usr/bin/chromium
        run: ./scripts/checkpoint-health.sh

  macos:
    name: platform-adaptation / macos-ci-gate
    runs-on: macos-15
    timeout-minutes: 45
    env:
      STYIO_FLUTTER_VERSION: "3.41.7"

    steps:
      - name: Checkout styio-view
        uses: actions/checkout@v5
        with:
          path: styio-view

      - name: Set up standardized Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.STYIO_FLUTTER_VERSION }}

      - name: Restore Flutter dependencies
        working-directory: styio-view/frontend/styio_view_app
        run: flutter pub get

      - name: Run macOS platform tests
        working-directory: styio-view/frontend/styio_view_app
        run: >
          flutter test
          test/module_lifecycle_test.dart
          test/runtime_surfaces_test.dart
          test/shell_model_test.dart

      - name: Build macOS desktop runner
        working-directory: styio-view/frontend/styio_view_app
        run: |
          flutter config --enable-macos-desktop
          flutter build macos --debug

  windows:
    name: platform-adaptation / windows-ci-gate
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      STYIO_FLUTTER_VERSION: "3.41.7"

    steps:
      - name: Checkout styio-view
        uses: actions/checkout@v5
        with:
          path: styio-view

      - name: Set up standardized Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.STYIO_FLUTTER_VERSION }}

      - name: Restore Flutter dependencies
        working-directory: styio-view/frontend/styio_view_app
        run: flutter pub get

      - name: Run Windows platform tests
        working-directory: styio-view/frontend/styio_view_app
        run: >
          flutter test
          test/module_lifecycle_test.dart
          test/runtime_surfaces_test.dart
          test/shell_model_test.dart

      - name: Build Windows desktop runner
        working-directory: styio-view/frontend/styio_view_app
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --debug

  test-smoke:
    name: test / smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      STYIO_FLUTTER_VERSION: "3.41.7"

    steps:
      - name: Checkout styio-view
        uses: actions/checkout@v5
        with:
          path: styio-view

      - name: Set up standardized Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.STYIO_FLUTTER_VERSION }}

      - name: Restore Flutter dependencies
        working-directory: styio-view/frontend/styio_view_app
        run: flutter pub get

      - name: Run smoke tests
        working-directory: styio-view/frontend/styio_view_app
        run: >
          flutter test
          test/styio_view_app_smoke_test.dart
          test/styio_language_service_smoke_test.dart

  test-golden-standard:
    name: test / golden-standard
    needs: [linux, macos, windows, test-smoke]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      STYIO_NODE_VERSION: "24.15.0"
      STYIO_FLUTTER_VERSION: "3.41.7"

    steps:
      - name: Checkout styio-view
        uses: actions/checkout@v5

      - name: Set up standardized Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.STYIO_NODE_VERSION }}

      - name: Set up standardized Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.STYIO_FLUTTER_VERSION }}

      - name: Install standardized Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium
          chromium_version="$(chromium --product-version)"
          test -n "$chromium_version"
          echo "STYIO_CHROMIUM_VERSION=$chromium_version" >> "$GITHUB_ENV"
          echo "Chromium $chromium_version"

      - name: Restore Flutter dependencies
        working-directory: frontend/styio_view_app
        run: flutter pub get

      - name: Restore prototype dependencies
        working-directory: prototype
        run: npm ci

      - name: Run Flutter golden tests
        working-directory: frontend/styio_view_app
        run: flutter test

      - name: Run docs gate
        run: ./scripts/docs-gate.sh

      - name: Run checkpoint health
        env:
          STYIO_CHROME_PATH: /usr/bin/chromium
        run: ./scripts/checkpoint-health.sh
